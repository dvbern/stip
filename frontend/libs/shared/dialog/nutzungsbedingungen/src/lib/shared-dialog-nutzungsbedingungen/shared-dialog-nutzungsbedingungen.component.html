<section class="tw:relative tw:flex tw:max-h-dvh tw:flex-col tw:overflow-y-auto tw:rounded-lg tw:p-8">
  <button
    type="button"
    (click)="cancel()"
    class="dv-icon-button dv-icon-button-md position-absolute end-0 top-0 m-1"
    [attr.aria-label]="'shared.close' | transloco"
  >
    <span class="material-symbols-rounded">close</span>
  </button>

  <h1 class="tw:!text-3xl">
    {{ 'shared.user.consent.dialog.title' | transloco }}
  </h1>

  <div class="tw:mt-4" [innerHTML]="'shared.user.consent.dialog.text' | transloco"></div>

  <div class="tw:mt-5 tw:flex tw:justify-between">
    <button type="button" class="btn btn-secondary" (click)="cancel()">
      {{ 'shared.cancel' | transloco }}
    </button>
    <!-- is type button on purpose -->
    <button type="button" class="btn btn-primary tw:ml-2" (click)="accept()">
      {{ 'shared.user.consent.dialog.accept' | transloco }}
    </button>
  </div>
</section>
